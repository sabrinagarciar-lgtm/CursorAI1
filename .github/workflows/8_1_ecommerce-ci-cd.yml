name: ShopEase CI/CD

on:
  push:
    branches: [main]
    paths:
      - "8_1_ecommerce/**"
      - ".github/workflows/8_1_ecommerce-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "8_1_ecommerce/**"
      - ".github/workflows/8_1_ecommerce-ci-cd.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PROJECT_DIR: 8_1_ecommerce

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.PROJECT_DIR }}/frontend/dist
          retention-days: 7

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Python package compiles
        run: python -m compileall app

  # ── Test ───────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: build-backend
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/backend
    env:
      FLASK_ENV: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest --cov=app --cov-report=term-missing

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy frontend to GitHub Pages
        id: deploy-frontend
        uses: actions/deploy-pages@v4

      - name: Deploy Flask backend
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.BACKEND_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "BACKEND_DEPLOY_WEBHOOK_URL secret not set — skipping backend deploy."
            echo "Add a webhook URL from your hosting provider (Render, Railway, etc.)."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
