[pytest]
testpaths = tests
markers =
    auth: Authentication token tests
    authorization: Role-based access control tests
    crud: CRUD operation tests for users, products, orders
    orders: Role-based order list and detail (My Orders / All Orders)
    validation: Input validation tests
    errors: Error handling (404, 400, 500)
    performance: Response time under 500ms
    rate_limit: Rate limiting tests
    positive: Successful checkout flow scenarios
    negative: Payment failures, invalid codes, validation errors
    edge: Empty cart, limits, concurrency, boundary values
    security: PCI-style validation, SQL injection prevention
    unit: Pure unit tests for services and utilities
