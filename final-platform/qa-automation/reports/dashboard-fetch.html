<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CursorHub QA Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --pass: #22c55e;
      --fail: #ef4444;
      --warn: #f59e0b;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 2rem 2rem 1rem;
      background: linear-gradient(135deg, #312e81, #0f172a);
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
    .subtitle { color: var(--muted); font-size: 0.95rem; }
    main { padding: 1.5rem 2rem 3rem; max-width: 1200px; margin: 0 auto; }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid #334155;
    }
    .card h2 { margin: 0 0 0.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .value { font-size: 1.75rem; font-weight: 700; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.pass { background: rgba(34,197,94,0.2); color: var(--pass); }
    .badge.fail { background: rgba(239,68,68,0.2); color: var(--fail); }
    .badge.partial, .badge.unknown { background: rgba(245,158,11,0.2); color: var(--warn); }
    .charts { display: grid; gap: 1.5rem; grid-template-columns: 1fr 1fr; margin-top: 1.5rem; }
    @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    canvas { max-height: 280px; }
    ul.recs { margin: 0; padding-left: 1.2rem; }
    ul.recs li { margin-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #334155; }
    footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 2rem; }
    .loading { color: var(--muted); padding: 2rem; text-align: center; }
    .error { color: var(--fail); padding: 1rem; background: rgba(239,68,68,0.1); border-radius: 8px; margin: 1rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>CursorHub Quality Dashboard</h1>
    <p class="subtitle" id="meta">Loading metrics…</p>
  </header>
  <main>
    <div id="loading" class="loading">Loading QA metrics…</div>
    <div id="error" class="error" style="display:none"></div>
    <div class="grid" id="kpis"></div>
    <div class="charts">
      <div class="card">
        <h2>Quality gates</h2>
        <canvas id="gatesChart"></canvas>
      </div>
      <div class="card">
        <h2>Test results</h2>
        <canvas id="testsChart"></canvas>
      </div>
    </div>
    <div class="card" style="margin-top: 1.5rem;">
      <h2>Gate details</h2>
      <table id="gatesTable"><thead><tr><th>Metric</th><th>Value</th><th>Target</th><th>Status</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card" style="margin-top: 1rem;">
      <h2>AI / QA recommendations</h2>
      <ul class="recs" id="recommendations"></ul>
    </div>
  </main>
  <footer>Generated by qa-automation/reports/generate-report.py</footer>
  <script>
    const statusClass = (s) => (s === "pass" ? "pass" : s === "fail" ? "fail" : "partial");

    function renderKpis(m) {
      const el = document.getElementById("kpis");
      const items = [
        { label: "Overall", value: m.overall_status, badge: true },
        { label: "Coverage", value: m.coverage_percent != null ? m.coverage_percent + "%" : "—", gate: m.gates?.coverage },
        { label: "Tests passed", value: `${m.tests?.passed ?? 0}/${m.tests?.total ?? 0}`, gate: m.tests?.failed ? "fail" : "pass" },
        { label: "p95 latency", value: m.performance?.p95_ms != null ? m.performance.p95_ms + " ms" : "—", gate: m.gates?.response_time },
        { label: "Critical vulns", value: m.security?.total_critical ?? 0, gate: m.gates?.security_critical },
        { label: "ESLint errors", value: m.eslint?.errors ?? 0, gate: m.gates?.eslint },
      ];
      el.innerHTML = items.map((i) => `
        <div class="card">
          <h2>${i.label}</h2>
          <div class="value">${i.value}</div>
          ${i.badge ? `<span class="badge ${statusClass(i.value)}">${i.value}</span>` :
            i.gate ? `<span class="badge ${statusClass(i.gate)}">${i.gate}</span>` : ""}
        </div>`).join("");
      document.getElementById("meta").textContent =
        `${m.project || "CursorHub"} · ${m.generated_at || "pending run"}`;
    }

    function renderTable(m) {
      const tbody = document.querySelector("#gatesTable tbody");
      const rows = [
        ["Coverage", m.coverage_percent, m.targets?.coverage_percent + "%", m.gates?.coverage],
        ["Max complexity", m.complexity?.max_complexity, "< " + m.targets?.complexity_max, m.gates?.complexity],
        ["Critical vulnerabilities", m.security?.total_critical, m.targets?.critical_vulnerabilities, m.gates?.security_critical],
        ["p95 response (k6)", m.performance?.p95_ms, "< " + m.targets?.response_time_p95_ms + " ms", m.gates?.response_time],
        ["Error rate", m.performance?.error_rate_percent, "< " + m.targets?.error_rate_percent + "%", m.gates?.error_rate],
      ];
      tbody.innerHTML = rows.map(([name, val, target, st]) => `
        <tr>
          <td>${name}</td>
          <td>${val ?? "—"}</td>
          <td>${target ?? "—"}</td>
          <td><span class="badge ${statusClass(st)}">${st || "unknown"}</span></td>
        </tr>`).join("");
    }

    function renderCharts(m) {
      const gates = m.gates || {};
      const labels = Object.keys(gates);
      const passCount = labels.filter((k) => gates[k] === "pass").length;
      new Chart(document.getElementById("gatesChart"), {
        type: "doughnut",
        data: {
          labels: ["Pass", "Fail/Other"],
          datasets: [{ data: [passCount, labels.length - passCount], backgroundColor: ["#22c55e", "#ef4444"] }],
        },
        options: { plugins: { legend: { labels: { color: "#e2e8f0" } } } },
      });
      new Chart(document.getElementById("testsChart"), {
        type: "bar",
        data: {
          labels: ["Passed", "Failed", "Skipped"],
          datasets: [{
            label: "Tests",
            data: [m.tests?.passed ?? 0, m.tests?.failed ?? 0, m.tests?.skipped ?? 0],
            backgroundColor: ["#6366f1", "#ef4444", "#94a3b8"],
          }],
        },
        options: {
          scales: { x: { ticks: { color: "#94a3b8" } }, y: { ticks: { color: "#94a3b8" } } },
          plugins: { legend: { display: false } },
        },
      });
    }

    function renderRecs(m) {
      const ul = document.getElementById("recommendations");
      ul.innerHTML = (m.recommendations || []).map((r) => `<li>${r}</li>`).join("");
    }

    function renderAll(m) {
      document.getElementById("loading").style.display = "none";
      renderKpis(m);
      renderTable(m);
      renderCharts(m);
      renderRecs(m);
    }

    async function loadMetrics() {
      const errEl = document.getElementById("error");
      try {
        const res = await fetch("/qa-metrics.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.tests?.total) throw new Error("Metrics file is empty — run ./scripts/run-all-qa.sh");
        renderAll(data);
      } catch (e) {
        document.getElementById("loading").style.display = "none";
        errEl.style.display = "block";
        errEl.textContent =
          "Could not load QA metrics. Run: cd final-platform/qa-automation && ./scripts/run-all-qa.sh";
        console.error(e);
      }
    }

    loadMetrics();
  </script>
</body>
</html>
