# SonarQube / SonarCloud analysis for ShopEase 8_1
sonar.projectKey=shopease-8_1-ecommerce
sonar.projectName=ShopEase E-Commerce 8_1
sonar.projectVersion=1.0

sonar.sources=../../frontend/src,../../backend/app
sonar.tests=../../backend/tests,../tests
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/*.test.tsx,**/tests/e2e/**

sonar.python.version=3.12
sonar.javascript.lcov.reportPaths=../results/frontend-coverage/lcov.info
sonar.python.coverage.reportPaths=../results/backend-coverage.xml
sonar.junit.reportPaths=../results/**/*junit*.xml

sonar.qualitygate.wait=true
sonar.coverage.exclusions=**/conftest.py,**/test_*.py,**/run.py

# Quality gate targets (documented; configure in Sonar UI)
# - Coverage >= 80%
# - Cognitive complexity per function < 10
# - 0 critical/blocker issues
